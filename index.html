<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Quote Machine</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6/babel.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #2c3e50;
      transition: background-color 0.6s ease;
      padding: 20px;
    }

    #app-wrapper {
      text-align: center;
      width: 100%;
    }

    #quote-box {
      background: #f5f5f5;
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      padding: 40px 35px 30px;
      border-radius: 4px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
    }

    #text {
      font-size: 2rem;
      line-height: 1.35;
      margin-bottom: 20px;
      transition: color 0.6s ease;
      word-wrap: break-word;
    }

    #text i {
      margin-right: 10px;
    }

    #author {
      font-size: 1.25rem;
      text-align: right;
      margin-bottom: 30px;
      transition: color 0.6s ease;
    }

    .button-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .social-buttons {
      display: flex;
      gap: 10px;
    }

    #tweet-quote,
    .icon-btn,
    #new-quote {
      border: none;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      border-radius: 4px;
      transition: opacity 0.3s ease, background-color 0.6s ease;
    }

    #tweet-quote,
    .icon-btn {
      width: 44px;
      height: 44px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 1.1rem;
    }

    #new-quote {
      padding: 12px 20px;
      font-size: 1rem;
    }

    #tweet-quote:hover,
    .icon-btn:hover,
    #new-quote:hover {
      opacity: 0.9;
    }

    .credit {
      margin-top: 18px;
      color: white;
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      #quote-box {
        padding: 28px 22px;
      }

      #text {
        font-size: 1.45rem;
      }

      #author {
        font-size: 1rem;
      }

      .button-row {
        flex-direction: column;
        align-items: stretch;
      }

      .social-buttons {
        justify-content: flex-start;
      }

      #new-quote {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>

  <script type="text/babel">
    const quotes = [
      {
        text: "We must believe that we are gifted for something, and that this thing, at whatever cost, must be attained.",
        author: "Marie Curie"
      },
      {
        text: "Be yourself; everyone else is already taken.",
        author: "Oscar Wilde"
      },
      {
        text: "In the middle of difficulty lies opportunity.",
        author: "Albert Einstein"
      },
      {
        text: "Do what you can, with what you have, where you are.",
        author: "Theodore Roosevelt"
      },
      {
        text: "Dream big and dare to fail.",
        author: "Norman Vaughan"
      },
      {
        text: "Success is not final, failure is not fatal: it is the courage to continue that counts.",
        author: "Winston Churchill"
      },
      {
        text: "A room without books is like a body without a soul.",
        author: "Marcus Tullius Cicero"
      },
      {
        text: "Turn your wounds into wisdom.",
        author: "Oprah Winfrey"
      }
    ];

    const colors = [
      "#2c3e50",
      "#16a085",
      "#27ae60",
      "#8e44ad",
      "#e67e22",
      "#c0392b",
      "#34495e",
      "#9b59b6"
    ];

    function App() {
      const [quote, setQuote] = React.useState(quotes[0]);
      const [color, setColor] = React.useState(colors[0]);

      React.useEffect(() => {
        showRandomQuote();
      }, []);

      const showRandomQuote = () => {
        let randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        let randomColor = colors[Math.floor(Math.random() * colors.length)];

        setQuote(randomQuote);
        setColor(randomColor);
        document.body.style.backgroundColor = randomColor;
      };

      const tweetLink =
        "https://twitter.com/intent/tweet?text=" +
        encodeURIComponent(`"${quote.text}" - ${quote.author}`);

      return (
        <div id="app-wrapper">
          <div id="quote-box">
            <div id="text" style={{ color: color }}>
              <i className="fa fa-quote-left"></i>
              {quote.text}
            </div>

            <div id="author" style={{ color: color }}>
              - {quote.author}
            </div>

            <div className="button-row">
              <div className="social-buttons">
                <a
                  id="tweet-quote"
                  href={tweetLink}
                  target="_blank"
                  rel="noopener noreferrer"
                  style={{ backgroundColor: color }}
                  title="Tweet quote"
                >
                  <i className="fab fa-twitter"></i>
                </a>

                <a
                  className="icon-btn"
                  href="https://www.tumblr.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  style={{ backgroundColor: color }}
                  title="Tumblr"
                >
                  <i className="fab fa-tumblr"></i>
                </a>
              </div>

              <button
                id="new-quote"
                onClick={showRandomQuote}
                style={{ backgroundColor: color }}
              >
                New quote
              </button>
            </div>
          </div>

          <div className="credit">by Simran Malhotra</div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
